<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YGOExclusives — Bulk Price Updater</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --bg:    #100d1a; --surf: #1a1530; --surf2: #211c38;
      --b1:    #2e2850; --b2:  #3d3668;
      --gold:  #c9a84c; --gold2: #e2c47a;
      --txt:   #e8e0f0; --muted: #7a7090; --dim: #4a4468;
      --green: #4caf7d; --yellow: #e2b24c; --red: #e25c5c; --blue: #5c9ee2;
    }
    body {
      background: var(--bg); color: var(--txt);
      font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
      margin: 0; padding: 24px 16px 80px;
      max-width: 680px; margin-inline: auto;
    }
    .page-title { text-align: center; margin-bottom: 32px; }
    .page-title h1 { font-family: 'Cinzel', serif; font-size: 1.4rem; color: var(--gold2); margin: 0 0 6px; }
    .page-title p  { color: var(--muted); font-size: 0.82rem; margin: 0; }
    .dev-badge {
      display: inline-block; background: #ff9900; color: #000;
      font-size: 0.7rem; font-weight: 700; padding: 2px 8px;
      border-radius: 4px; margin-top: 8px; letter-spacing: 0.05em;
    }

    .card {
      background: var(--surf2); border: 1px solid var(--b1);
      border-radius: 12px; padding: 20px 24px; margin-bottom: 16px;
    }
    .card h2 {
      font-family: 'Cinzel', serif; font-size: 0.78rem;
      color: var(--gold2); letter-spacing: 0.07em;
      margin: 0 0 14px; text-transform: uppercase;
    }

    label.opt {
      display: flex; align-items: flex-start; gap: 10px;
      cursor: pointer; font-size: 0.85rem; color: var(--txt);
    }
    label.opt input { margin-top: 3px; accent-color: var(--gold); }
    label.opt .sub  { display: block; color: var(--muted); font-size: 0.78rem; margin-top: 2px; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 10px 20px; border-radius: 8px; border: none;
      font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 600;
      cursor: pointer; transition: opacity 0.15s; text-decoration: none;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary   { background: var(--gold); color: #1a1530; }
    .btn-primary:hover:not(:disabled) { opacity: 0.88; }
    .btn-secondary { background: var(--surf); color: var(--txt); border: 1px solid var(--b2); }
    .btn-full { width: 100%; }

    .stat-row  { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
    .stat-box  {
      background: var(--b1); border-radius: 8px; padding: 10px 14px;
      flex: 1; min-width: 90px; text-align: center;
    }
    .stat-box .val { font-family: 'Cinzel', serif; font-size: 1.25rem; font-weight: 700; color: var(--gold2); }
    .stat-box .lbl { font-size: 0.68rem; color: var(--muted); margin-top: 2px; }
    .val-green { color: var(--green) !important; }
    .val-muted { color: var(--muted) !important; }
    .val-red   { color: var(--red)   !important; }

    .progress-wrap { background: var(--b1); border-radius: 4px; height: 6px; margin-bottom: 8px; overflow: hidden; }
    .progress-bar  { background: var(--gold); height: 100%; width: 0%; transition: width 0.2s; }
    .prog-label    { font-size: 0.78rem; color: var(--muted); text-align: center; margin-bottom: 10px; }

    .log-wrap {
      background: var(--b1); border-radius: 8px;
      max-height: 220px; overflow-y: auto;
      padding: 10px 12px; font-size: 0.74rem;
      font-family: monospace; color: var(--muted); margin-top: 10px;
    }
    .log-ok   { color: var(--green); }
    .log-warn { color: var(--yellow); }
    .log-err  { color: var(--red); }

    .done-actions { display: flex; gap: 12px; margin-top: 12px; }
  </style>
</head>
<body>

<div class="page-title">
  <h1>Bulk Price Updater</h1>
  <p>Fetches TCG market &amp; low prices from YGOPRODeck — matched per card + rarity</p>
</div>

<div class="card">
  <h2>Options</h2>
  <label class="opt">
    <input type="checkbox" id="opt-overwrite" checked>
    <span>
      Overwrite existing prices
      <span class="sub">Re-fetch even if tcg_price is already set</span>
    </span>
  </label>
</div>

<button id="run-btn" class="btn btn-primary btn-full" onclick="run()">
  Fetch &amp; Update All Prices
</button>

<div class="card" id="progress-card" style="display:none;margin-top:16px">
  <h2>Progress</h2>
  <div class="stat-row">
    <div class="stat-box"><div class="val" id="s-printings">—</div><div class="lbl">YGOPRODeck Printings</div></div>
    <div class="stat-box"><div class="val" id="s-rate">—</div><div class="lbl">USD → CAD Rate</div></div>
    <div class="stat-box"><div class="val" id="s-db">—</div><div class="lbl">DB Rows Loaded</div></div>
    <div class="stat-box"><div class="val val-green" id="s-updated">0</div><div class="lbl">Updated</div></div>
    <div class="stat-box"><div class="val val-muted" id="s-skipped">0</div><div class="lbl">Skipped</div></div>
    <div class="stat-box"><div class="val val-red" id="s-errors">0</div><div class="lbl">Errors</div></div>
  </div>
  <div class="progress-wrap"><div class="progress-bar" id="prog-bar"></div></div>
  <div class="prog-label" id="prog-label">Starting…</div>
  <div class="log-wrap" id="log"></div>
</div>

<div class="card" id="done-card" style="display:none;margin-top:16px">
  <h2>Complete</h2>
  <div class="stat-row" id="done-stats"></div>
  <div class="done-actions">
    <button class="btn btn-secondary" onclick="location.reload()">Run Again</button>
    <a href="index.html" class="btn btn-primary">Open App →</a>
  </div>
</div>

<script>
// ── Config (self-contained — no external JS dependencies) ─────────────────────
const SUPABASE_URL = 'https://xyhzwmlqmazloyerelas.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5aHp3bWxxbWF6bG95ZXJlbGFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1MTE3NTEsImV4cCI6MjA5MzA4Nzc1MX0.dNaWuZUwX8eFqpFk0mp_cvGpYzOycuBGN7wUii8U0-E';

const TABLE   = 'card_inventory';
const FLD_MKT = 'tcg_price';
const FLD_LOW = 'tcg_low_price';
const FLD_CAD = 'tcg_price_cad';

const HEADERS = {
  'Content-Type':  'application/json',
  'apikey':        SUPABASE_KEY,
  'Authorization': 'Bearer ' + SUPABASE_KEY,
};

// ── UI helpers ────────────────────────────────────────────────────────────────
function log(msg, type = '') {
  const wrap = document.getElementById('log');
  const line = document.createElement('div');
  if (type) line.className = 'log-' + type;
  line.textContent = msg;
  wrap.appendChild(line);
  wrap.scrollTop = wrap.scrollHeight;
}

function setStat(id, val) {
  const el = document.getElementById(id);
  if (el) el.textContent = typeof val === 'number' ? val.toLocaleString() : val;
}

function setProgress(done, total, label) {
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('prog-label').textContent = label;
}

// ── Main ──────────────────────────────────────────────────────────────────────
async function run() {
  const btn          = document.getElementById('run-btn');
  const optOverwrite = document.getElementById('opt-overwrite').checked;

  btn.disabled = true;
  document.getElementById('progress-card').style.display = '';
  document.getElementById('done-card').style.display     = 'none';
  document.getElementById('log').innerHTML               = '';

  let totalUpdated = 0;
  let totalSkipped = 0;
  let totalErrors  = 0;

  // ── Step 1: Fetch YGOPRODeck (tcgplayer_data=true for per-printing prices) ──
  log('Fetching YGOPRODeck — this may take 10–20 seconds…');
  setProgress(0, 1, 'Fetching YGOPRODeck…');

  let priceMap; // "card_number|rarity" lowercase → { market, low }
  try {
    const res = await fetch('https://db.ygoprodeck.com/api/v7/cardinfo.php?tcgplayer_data=true');
    if (!res.ok) throw new Error('YGOPRODeck returned ' + res.status);
    const data = await res.json();

    priceMap = new Map();
    let pricedPrintings = 0;

    for (const card of data.data || []) {
      for (const s of card.card_sets || []) {
        const market = parseFloat(s.set_price)     || 0;
        const low    = parseFloat(s.set_price_low) || 0;
        if (market === 0 && low === 0) continue;

        const key = `${(s.set_code || '').trim().toLowerCase()}|${(s.set_rarity || '').trim().toLowerCase()}`;
        if (!priceMap.has(key)) {
          priceMap.set(key, { market, low });
          pricedPrintings++;
        }
      }
    }

    setStat('s-printings', pricedPrintings);
    log(`Loaded ${pricedPrintings.toLocaleString()} priced printings`, 'ok');
  } catch (e) {
    log('YGOPRODeck fetch failed: ' + e.message, 'err');
    btn.disabled = false;
    return;
  }

  // ── Step 2: Fetch USD → CAD exchange rate ────────────────────────────────────
  log('Fetching USD → CAD exchange rate…');
  let cadRate = null;
  try {
    const rateRes  = await fetch('https://api.frankfurter.app/latest?from=USD&to=CAD');
    if (!rateRes.ok) throw new Error('Frankfurter returned ' + rateRes.status);
    const rateData = await rateRes.json();
    cadRate = rateData.rates?.CAD;
    if (!cadRate) throw new Error('CAD rate missing from response');
    setStat('s-rate', cadRate.toFixed(4));
    log(`USD → CAD: ${cadRate.toFixed(4)} (as of ${rateData.date})`, 'ok');
  } catch (e) {
    log('Exchange rate fetch failed: ' + e.message + ' — CAD prices will not be written', 'warn');
  }

  // ── Step 3: Page through card_inventory (or cards in prod) ──────────────────
  log(`Loading ${TABLE} from Supabase…`);
  setProgress(0, 1, 'Loading inventory…');

  const PAGE    = 1000;
  let allRows   = [];
  let offset    = 0;

  const countRes = await fetch(
    `${SUPABASE_URL}/rest/v1/${TABLE}?select=id&limit=1`,
    { headers: { ...HEADERS, 'Prefer': 'count=exact' } }
  );
  const totalRows = parseInt(countRes.headers.get('content-range')?.split('/')[1] || '0', 10);
  setStat('s-db', totalRows);

  while (true) {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/${TABLE}?select=id,card_number,rarity,${FLD_MKT}&limit=${PAGE}&offset=${offset}`,
      { headers: { ...HEADERS, 'Prefer': 'return=representation' } }
    );
    if (!res.ok) { log('DB fetch failed at offset ' + offset + ': ' + await res.text(), 'err'); break; }
    const batch = await res.json();
    allRows = allRows.concat(batch);
    if (batch.length < PAGE) break;
    offset += PAGE;
    setProgress(allRows.length, totalRows, `Loading… ${allRows.length.toLocaleString()} / ${totalRows.toLocaleString()}`);
  }

  log(`Loaded ${allRows.length.toLocaleString()} rows from DB`, 'ok');

  // ── Step 4: Match + build patches ───────────────────────────────────────────
  log('Matching prices…');
  const patches = [];

  for (const row of allRows) {
    if (!optOverwrite && row[FLD_MKT] > 0) { totalSkipped++; continue; }

    const key   = `${(row.card_number || '').trim().toLowerCase()}|${(row.rarity || '').trim().toLowerCase()}`;
    const match = priceMap.get(key);

    if (!match) { totalSkipped++; continue; }

    const patch = { id: row.id };
    if (match.market > 0) {
      patch[FLD_MKT] = +match.market.toFixed(2);
      if (cadRate) patch[FLD_CAD] = +(match.market * cadRate).toFixed(2);
    }
    if (match.low > 0) patch[FLD_LOW] = +match.low.toFixed(2);

    if (Object.keys(patch).length > 1) patches.push(patch);
    else totalSkipped++;
  }

  setStat('s-skipped', totalSkipped);
  log(`${patches.length.toLocaleString()} rows to update · ${totalSkipped.toLocaleString()} skipped (no match or already priced)`);

  if (!patches.length) {
    setProgress(1, 1, 'Done — nothing to update');
    log('Nothing to update.', 'warn');
    btn.disabled = false;
    return;
  }

  // ── Step 5: Batch PATCH ──────────────────────────────────────────────────────
  const BATCH       = 100;
  const totalBatches = Math.ceil(patches.length / BATCH);
  log(`Uploading in ${totalBatches} batch${totalBatches !== 1 ? 'es' : ''} of ${BATCH}…`);

  async function patchRow(row) {
    const { id, ...fields } = row;
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/${TABLE}?id=eq.${id}`,
      { method: 'PATCH', headers: HEADERS, body: JSON.stringify(fields) }
    );
    if (!res.ok) throw new Error(await res.text());
  }

  for (let i = 0; i < patches.length; i += BATCH) {
    const batch     = patches.slice(i, i + BATCH);
    const batchNum  = Math.floor(i / BATCH) + 1;
    const results   = await Promise.allSettled(batch.map(patchRow));
    let batchErrors = 0;
    results.forEach(r => r.status === 'fulfilled' ? totalUpdated++ : (totalErrors++, batchErrors++));
    setStat('s-updated', totalUpdated);
    setStat('s-errors',  totalErrors);
    if (batchErrors) log(`Batch ${batchNum}: ${batchErrors} failed`, 'err');
    setProgress(i + batch.length, patches.length, `Batch ${batchNum} / ${totalBatches} — ${totalUpdated.toLocaleString()} updated`);
    await new Promise(r => setTimeout(r, 0));
  }

  // ── Done ──────────────────────────────────────────────────────────────────────
  setProgress(patches.length, patches.length, 'Complete!');
  log(
    `Done — ${totalUpdated.toLocaleString()} updated · ${totalSkipped.toLocaleString()} skipped · ${totalErrors} errors`,
    totalErrors > 0 ? 'warn' : 'ok'
  );

  document.getElementById('done-card').style.display = '';
  document.getElementById('done-stats').innerHTML = `
    <div class="stat-box"><div class="val val-green">${totalUpdated.toLocaleString()}</div><div class="lbl">Updated</div></div>
    <div class="stat-box"><div class="val val-muted">${totalSkipped.toLocaleString()}</div><div class="lbl">Skipped</div></div>
    <div class="stat-box"><div class="val ${totalErrors ? 'val-red' : 'val-muted'}">${totalErrors}</div><div class="lbl">Errors</div></div>
  `;

  btn.disabled = false;
}
</script>
</body>
</html>
