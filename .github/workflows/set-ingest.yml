name: New Set Ingestion

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday at 6am UTC (new sets release Fridays)
  workflow_dispatch:       # Manual trigger from GitHub Actions tab

jobs:
  ingest-sets:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run set ingestion
        run: node scripts/set-ingest.js
        env:
          SUPABASE_URL: https://xyhzwmlqmazloyerelas.supabase.co
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
