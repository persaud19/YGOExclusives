name: Scheduled Price Update

on:
  schedule:
    - cron: '0 0 1 * *'    # 1st of every month at midnight UTC
    - cron: '0 0 15 * *'   # 15th of every month at midnight UTC
  workflow_dispatch:        # Manual trigger from GitHub Actions tab

jobs:
  update-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run price update
        run: node scripts/price-update.js
        env:
          SUPABASE_URL: https://cioijkralojzgelytbfc.supabase.co
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
